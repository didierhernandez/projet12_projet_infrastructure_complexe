# Ce fichier docker-compose-tools.yml à la racine /poc/
# Outils de monitoring et visualisation avec pgadmin et Metabase
# Didier : Très utile pour vérifier l'état des tables avant/après ingestion Spark.
# Didier : Port 5050 choisi pour éviter les conflits avec Kestra (8089) et Redpanda (8080).
# Didier : Ajout de Metabase validé. Configuration affinée pour la persistance des tableaux de bord.
# Didier : reste à faire : sécuriser les mots de passe

services:
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_visualizer
    networks:
      - poc_network
    # On supprime "depends_on: postgres" car Postgres est dans un autre fichier.
    # La communication se fera naturellement via le réseau poc_network.
    environment:
      # Identifiants de connexion à l'interface pgAdmin
      - PGADMIN_DEFAULT_EMAIL=admin@poc.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      # Désactive les mails de récupération pour simplifier le POC
      - PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION=False
    ports:
      - "5050:80"
    # Optionnel : persistance des serveurs enregistrés dans pgAdmin
    volumes:
      - ./storage/pgadmin_data:/var/lib/pgadmin

  metabase:
    image: metabase/metabase:latest
    container_name: metabase_projet7
    ports: 
      - "3000:3000"
    volumes: 
      # On monte le dossier local vers un dossier dédié dans le conteneur
      - ./storage/metabase_data:/metabase-data
    environment:
      # On force Metabase à sauvegarder sa base interne (H2) dans notre volume. 
      # Indispensable pour ne pas perdre les KPI de Juliette si on "docker-compose down".
      - MB_DB_FILE=/metabase-data/metabase.db
    networks: 
      - poc_network

networks:
  poc_network:
    external: true