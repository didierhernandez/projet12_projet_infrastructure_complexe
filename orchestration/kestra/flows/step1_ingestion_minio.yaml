# fichier step1_ingestion_minio.yaml dans poc/kestra/flows
# Flux Kestra Step 1 : Création du Bucket et Validation (Mode LIVE)
# Il fait partie de la phase A : Préparation des Images "Custom" (Dockerisation)
# de l'étape2 : Génération et Ingestion sans Soda avec Debezium allumé
#
# Didier : Ce flow est conçu pour tourner APRÈS Step1a.
# Il NE SUPPRIME PLUS les données de MinIO au démarrage pour conserver l'historique !
# Mais il purge les checkpoints Spark pour garantir un nouveau stream Live propre.
# Attention : il faut toujours avoir lancé le Step0a puis Step0 puis Step0bis au moins une fois avant 
#si on veut un historique conséquent.
# Didier : Alerte "Noms de Variables" résolue : Spark attend AWS_ACCESS_KEY_ID et AWS_SECRET_ACCESS_KEY.

id: p12_step1_complet
namespace: poc.didier
description: "Flux de données Live (Redpanda -> Spark Streaming -> MinIO) - Mode Continu Naturel"

tasks:
  - id: prepare_live_environment
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Nettoyage des conteneurs sans toucher aux données"
    containerImage: docker:cli
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - /home/dev/projects/p12/poc:/app
    commands:
      - echo "Nettoyage forcé des conteneurs..."
      # Didier : On ajoute 'redpanda' ici. 
      # On supprime le CONTENEUR, mais pas le VOLUME. Les données sont sauvées.
      - docker rm -f generator_live spark_streaming_ingestion redpanda || true

      - echo "Relance propre de Redpanda..."
      # docker-compose-streaming.yml va recréer le conteneur et se reconnecter automatiquement au volume existant
      - docker compose -f /app/docker-compose-streaming.yml up -d redpanda
      
      - echo "Environnement prêt et données conservées."

  - id: build_images
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Mise à jour des images Docker"
    containerImage: docker:cli
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: host
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - /home/dev/projects/p12/poc:/app
    commands:
      - docker build -t poc-generator:latest /app/generator/
      - docker build -t poc-spark-streaming:latest /app/spark/

  - id: start_infra_live
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Lancement du Live avec configuration explicite (sans toucher aux fichiers Compose)"
    containerImage: docker:cli
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: "poc_network"
      volumes:
        - "/var/run/docker.sock:/var/run/docker.sock"
        - "/home/dev/projects/p12/poc:/app"
        - "/home/dev/projects/p12/poc/storage/minio_data:/data"
    commands:
      - |
        echo "--- COMPTAGE INITIAL ---"
        COUNT_BEFORE=$(find /data/raw/rh/salaries/ -name "*.parquet" 2>/dev/null | wc -l)
        echo "$COUNT_BEFORE" > /data/count_before.txt
        echo "Nombre de fichiers Parquet actuels : $COUNT_BEFORE"

        echo "1/2 Lancement du générateur live..."
        docker compose -f /app/docker-compose-generator.yml up -d generator-live

        echo "--- PAUSE DE 15 SECONDES ---"
        # laisser au générateur le temps de faire ses premières écritures SQL en base avant que Spark n'arrive, 
        #mais la mécanique du schéma a bel et bien basculé côté CDC
        sleep 15

        echo "2/2 Lancement de Spark Streaming (Configuration explicite)..."
        docker run -d --name spark_streaming_ingestion \
          --network poc_network \
          -e MINIO_ENDPOINT="http://minio:9000" \
          -e AWS_ACCESS_KEY_ID="admin" \
          -e AWS_SECRET_ACCESS_KEY="password" \
          -e SCHEMA_REGISTRY_URL="http://redpanda:8081" \
          -e SPARK_MODE="STREAMING" \
          -v /home/dev/projects/p12/poc/spark/checkpoints_live:/opt/spark/checkpoints_live \
          -v /home/dev/projects/p12/poc/spark/jobs:/opt/spark/jobs \
          poc-spark-streaming:latest \
          /opt/spark/bin/spark-submit --master "local[*]" /opt/spark/jobs/stream_to_minio.py

        echo "Captation du flux pendant 180 secondes..."
        sleep 180

        echo "--- LOGS DE DEBUG SPARK : gestion des erreurs silencieuses ---"
        docker logs spark_streaming_ingestion --tail 100 || true

  - id: stop_and_validate
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Arrêt et calcul de la performance du Live (Delta)"
    containerImage: docker:cli
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      volumes:
        - "/home/dev/projects/p12/poc/storage/minio_data:/data"
        - "/var/run/docker.sock:/var/run/docker.sock"
    commands:
      - |
        echo "Arrêt des workers (Générateur et Spark)..."
        docker stop generator_live spark_streaming_ingestion || true
        docker rm -f generator_live spark_streaming_ingestion || true
        echo "Note : Redpanda reste allumé pour conserver le topic et les schémas conformément à la stratégie de continuité."

        echo "--- VALIDATION DU DELTA ---"
        
        # Didier : Validation basée sur l'augmentation du nombre de fichiers Parquet
        # On reste sur le dossier global /salaries/ pour respecter la version initiale
        if [ -f /data/count_before.txt ]; then
            COUNT_BEFORE=$(cat /data/count_before.txt)
            COUNT_AFTER=$(find /data/raw/rh/salaries/ -name "*.parquet" 2>/dev/null | wc -l)
            DELTA=$((COUNT_AFTER - COUNT_BEFORE))

            echo "Fichiers Parquet AVANT exécution (Step 1) : $COUNT_BEFORE"
            echo "Fichiers Parquet APRES exécution (Step 1 + Live) : $COUNT_AFTER"
            echo "Nouveaux fichiers produits par le flux Live : $DELTA"

            if [ "$COUNT_AFTER" -gt "$COUNT_BEFORE" ]; then
              echo "SUCCÈS : Le flux Live a produit de nouvelles partitions Parquet !"
              exit 0
            else
              echo "ERREUR : Aucun nouveau fichier détecté. Le flux a peut-être échoué ou Spark n'a pas eu le temps d'écrire."
              exit 1
            fi
        else
            echo "ERREUR CRITIQUE : Le fichier de référence /data/count_before.txt est introuvable."
            exit 1
        fi