# Fichier : poc/kestra/flows/step2_transformation_minio_dwh.yaml
# Ce flow lance Spark avec les paramètres métiers. À copier/coller dans Kestra.
# 
# Didier : Ce fichier fait partie de la Phase 3 - Step 2 (Batch DWH)
# Didier : Cette version "Full Refresh" est adaptée pour recalculer tout l'historique 
#          à la volée et facilement changer les règles métiers (ex: prime à 7%).
# 
# ÉVOLUTION MAJEURE : Les paramètres métiers sont gérés par Kestra (inputs). 
# Ils sont injectés comme variables d'environnement dans le container Spark.
# Tu n'as donc PLUS BESOIN de modifier le fichier Python 'batch_dwh_postgres.py' 
# si la direction décide de changer le seuil d'activités ou le taux de prime !

id: p12_step2_batch_dwh_full
namespace: poc.didier
description: "Recalcul complet de l'historique DWH Postgres pour Metabase (Full Refresh)"

inputs:
  - id: param_taux_prime
    type: STRING
    defaults: "0.05"
    description: "Pourcentage de la prime sportive (ex: 0.05 pour 5%)"
    
  - id: param_seuil_activites
    type: STRING
    defaults: "15"
    description: "Nombre minimum de séances pour déclencher l'éligibilité au Bien-Être"

tasks:
  - id: load_reference_data
    type: io.kestra.plugin.scripts.shell.Commands # CORRECTION ICI : 'type' en minuscule
    description: "Purge de la table ref_salaries (Postgres) et rechargement amnésique depuis le CSV"
    containerImage: python:3.9-slim
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: poc_network
      volumes:
        # On monte la racine du projet 'poc' vers '/app' dans le container.
        # Cela permet au script Python d'accéder à la fois au code (/app/scripts/)
        # et aux données (/app/generator/data/)
        - /home/dev/projects/p12/poc:/app
    commands:
      # Installation des dépendances nécessaires pour discuter avec Postgres
      - pip install pandas sqlalchemy psycopg2-binary
      # Exécution du script de chargement du référentiel
      - python /app/scripts/load_ref_salaries.py

  - id: run_spark_dwh_full
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Lancement du job Spark de calcul (Batch) avec injection des paramètres Kestra"
    containerImage: docker:cli
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: poc_network
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - |
        docker run --rm --name spark_batch_dwh \
        --network poc_network \
        -v /home/dev/projects/p12/poc/spark/jobs:/opt/spark/jobs \
        -v /home/dev/projects/p12/poc/spark/libs:/opt/spark/libs \
        -e PARAM_TAUX_PRIME="{{ inputs.param_taux_prime }}" \
        -e PARAM_SEUIL_BIEN_ETRE="{{ inputs.param_seuil_activites }}" \
        -e MINIO_ENDPOINT="http://minio:9000" \
        -e AWS_ACCESS_KEY_ID="admin" \
        -e AWS_SECRET_ACCESS_KEY="password" \
        poc-spark-streaming:latest \
        /opt/spark/bin/spark-submit \
        --master local[*] \
        --jars /opt/spark/libs/postgresql-42.6.0.jar,/opt/spark/libs/hadoop-aws-3.3.4.jar,/opt/spark/libs/aws-java-sdk-bundle-1.12.262.jar \
        /opt/spark/jobs/batch_dwh_postgres.py