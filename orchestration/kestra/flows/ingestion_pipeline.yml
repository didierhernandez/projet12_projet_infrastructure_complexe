# Fichier ingestion_pipeline.yml  dans poc/kestra/flows
# Il fait partie de la phase A : Préparation des Images "Custom" (Dockerisation)
#de l'étape2 : Génération et Ingestion avec Soda
# Ton workflow Kestra
# Didier : tu devras copier/coller ce code directement dans l'interface web de Kestra (http://localhost:8080) 
#dans l'onglet "Flows"
# Ce code n'est pas complet et contient des volumes non définis complétement

id: ingestion_qualite_soda
namespace: poc.sport
revision: 1
description: Pipeline de vérification de la qualité des données brutes sur MinIO

tasks:
  - id: run_soda_scan
    type: io.kestra.plugin.docker.Run
    # On utilise l'image locale que tu auras buildée avec "docker build -t soda_agent:latest ./soda"
    containerImage: soda_agent:latest
    commands:
      # L'ENTRYPOINT "soda" étant déjà dans le Dockerfile, on passe juste les arguments :
      - scan
      - -d
      - minio_raw
      - -c
      - /soda/configuration.yml
      - /soda/checks/check_minio_raw.yml
    volumes:
      # Pense à remplacer "/chemin/absolu/vers/ton/poc" par le vrai chemin sur ton Ubuntu (ex: /home/didier/poc)
      - /chemin/absolu/vers/ton/poc/soda/configuration.yml:/soda/configuration.yml
      - /chemin/absolu/vers/ton/poc/soda/checks:/soda/checks